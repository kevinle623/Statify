name: Quality Checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  format-lint-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prettier check
        run: bun run format:check

      - name: ESLint
        run: bun run lint

      - name: Unit tests
        run: bun run test
